# Cloudflare Pages config for WallaBot Landing
# Deploy: npx wrangler pages deploy dist --project-name=wallabot-landing

name = "wallabot-landing"
compatibility_date = "2026-05-18"

# Static site — no functions needed
pages_build_output_dir = "dist"

[env.production]
# Custom domain (set up in Cloudflare Dashboard)
# 1. Go to Cloudflare Pages > wallabot-landing > Custom domains
# 2. Add: wallabot.pro
